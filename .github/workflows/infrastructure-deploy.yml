name: Infrastructure Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'init'
        type: choice
        options:
          - init
          - validate
          - plan
          - apply
          - destroy
permissions:
  contents: read
  pull-requests: write
  issues: write

# Prevent concurrent deployments
concurrency:
  group: infrastructure-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.9.0'
  AWS_REGION: 'eu-west-3'
  WORKING_DIR: ./terraform

jobs:
  # ─── Job 1: Validate and Format Check ──────────────────────────────────────
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Validate
        run: terraform validate

  # ─── Job 2: Plan ────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    environment: Production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=starttech/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Create tfvars file
        run: |
          cat > terraform.tfvars << EOF
          aws_region             = "${{ env.AWS_REGION }}"
          project_name           = "starttech"
          environment            = "prod"
          vpc_cidr               = "10.0.0.0/16"
          public_subnet_cidrs    = ["10.0.1.0/24", "10.0.2.0/24"]
          private_subnet_cidrs   = ["10.0.11.0/24", "10.0.12.0/24"]
          availability_zones     = ["${{ env.AWS_REGION }}a", "${{ env.AWS_REGION }}b"]
          eks_cluster_version    = "1.34"
          eks_node_instance_type = "t3.small"
          eks_node_desired_size  = 2
          eks_node_min_size      = 2
          eks_node_max_size      = 4
          s3_bucket_name         = "${{ secrets.S3_BUCKET_NAME }}"
          redis_node_type        = "cache.t3.micro"
          EOF

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -detailed-exitcode \
            2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.WORKING_DIR }}/tfplan
            ${{ env.WORKING_DIR }}/plan-output.txt
          retention-days: 5

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.WORKING_DIR }}/plan-output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... Output truncated ...'
              : planOutput;

            const body = `## Terraform Plan Results

            **Workflow:** \`${{ github.workflow }}\`
            **Triggered by:** \`${{ github.actor }}\`
            **Commit:** \`${{ github.sha }}\`

            <details>
            <summary>📋 Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            > Plan exit code: \`${{ steps.plan.outputs.exitcode }}\`
            > - \`0\` = No changes
            > - \`1\` = Error
            > - \`2\` = Changes detected`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # ─── Job 3: Apply (main branch only) ────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    environment: Production
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'workflow_dispatch')
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=starttech/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Configure kubectl
        run: |
          CLUSTER_NAME=$(terraform output -raw eks_cluster_name)
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name "$CLUSTER_NAME"
          kubectl get nodes

      - name: Print outputs
        run: terraform output

      - name: Post apply summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| EKS Cluster | $(terraform output -raw eks_cluster_name 2>/dev/null || echo 'N/A') |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront | $(terraform output -raw cloudfront_domain 2>/dev/null || echo 'N/A') |" >> $GITHUB_STEP_SUMMARY
          echo "| Redis | $(terraform output -raw redis_endpoint 2>/dev/null || echo 'N/A') |" >> $GITHUB_STEP_SUMMARY

  # ─── Job 4: Destroy (manual only) ───────────────────────────────────────────
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: Production
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=starttech/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Create tfvars file
        run: |
          cat > terraform.tfvars << EOF
          aws_region             = "${{ env.AWS_REGION }}"
          project_name           = "starttech"
          environment            = "prod"
          vpc_cidr               = "10.0.0.0/16"
          public_subnet_cidrs    = ["10.0.1.0/24", "10.0.2.0/24"]
          private_subnet_cidrs   = ["10.0.11.0/24", "10.0.12.0/24"]
          availability_zones     = ["${{ env.AWS_REGION }}a", "${{ env.AWS_REGION }}b"]
          eks_cluster_version    = "1.34"
          eks_node_instance_type = "t3.small"
          eks_node_desired_size  = 2
          eks_node_min_size      = 2
          eks_node_max_size      = 4
          s3_bucket_name         = "${{ secrets.S3_BUCKET_NAME }}"
          redis_node_type        = "cache.t3.micro"
          EOF

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="terraform.tfvars" \
            -auto-approve